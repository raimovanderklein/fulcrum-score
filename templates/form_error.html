{% extends "base.html" %}
{% block title %}Form error — Encounter{% endblock %}

{% block content %}
<div class="page">
  <div class="error-page">
    <div class="error-label">Couldn't process the form</div>
    <div class="error-text">{{ error }}</div>
  </div>
  <p style="margin-top: 24px; font-family: var(--sans); font-size: 13px;">
    {% if back_url %}
    <a href="{{ back_url }}">← Back</a>
    {% elif slug %}
    <a href="{{ url_for('report', slug=slug) }}">← Back to the report</a>
    {% else %}
    <a href="{{ url_for('home') }}">← Back to reports</a>
    {% endif %}
  </p>
</div>
{% endblock %}
